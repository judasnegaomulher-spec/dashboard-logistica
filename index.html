<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Logístico</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<h1>Dashboard Inteligente de Monitoramento Logístico</h1>
</header>

<div class="cards">

<div class="card">
<h2>Total de Entregas</h2>
<p id="total">0</p>
</div>

<div class="card">
<h2>Entregas Atrasadas</h2>
<p id="atrasadas">0</p>
</div>

<div class="card">
<h2>% de Atraso</h2>
<p id="percentual">0%</p>
</div>

</div>

<div class="container">

<div class="grafico">
<h3>Atrasos por Transportadora</h3>
<canvas id="transportadoraChart"></canvas>
</div>

<div class="grafico">
<h3>Atrasos por Região</h3>
<canvas id="regiaoChart"></canvas>
</div>

</div>

<div class="tabela">

<h3>Ranking de Entregas Críticas</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Transportadora</th>
<th>Região</th>
<th>Dias de Atraso</th>
</tr>
</thead>

<tbody id="rankingBody"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
